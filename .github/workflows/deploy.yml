name: Deploy docgen worker

on:
  push:
    branches: [main]
    paths:
      - 'worker/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-northeast-1

      - uses: aws-actions/amazon-ecr-login@v2

      - name: ビルド＆プッシュ＆ECS更新
        run: |
          cd worker
          docker build \
            -t 373914339097.dkr.ecr.ap-northeast-1.amazonaws.com/docgen-worker:latest \
            -t 373914339097.dkr.ecr.ap-northeast-1.amazonaws.com/docgen-worker:${{ github.sha }} .
          docker push 373914339097.dkr.ecr.ap-northeast-1.amazonaws.com/docgen-worker:latest
          docker push 373914339097.dkr.ecr.ap-northeast-1.amazonaws.com/docgen-worker:${{ github.sha }}
          aws ecs update-service \
            --cluster docgen-worker-cluster \
            --service docgen-worker-service \
            --force-new-deployment
